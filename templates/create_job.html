{% extends "layout.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
}

/* CONTAINER */
.job-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 40px;
}

/* CARD */
.job-card {
    width: 600px;
    background: white;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    animation: fadeIn 0.5s ease-in-out;
}

/* HEADER */
.job-card h2 {
    text-align: center;
    color: #1e3a8a;
    margin-bottom: 10px;
}

.job-card p {
    text-align: center;
    color: gray;
    font-size: 14px;
    margin-bottom: 25px;
}

/* TEXTAREA GROUP */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group textarea {
    width: 100%;
    height: 150px;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    resize: none;
    font-size: 14px;
    transition: 0.3s;
}

.input-group textarea:focus {
    border-color: #2563eb;
    box-shadow: 0 0 8px rgba(37,99,235,0.2);
}

/* FLOAT LABEL */
.input-group label {
    position: absolute;
    top: -10px;
    left: 15px;
    background: white;
    padding: 0 6px;
    font-size: 12px;
    color: #2563eb;
}

/* CHAR COUNT */
.char-count {
    text-align: right;
    font-size: 12px;
    color: gray;
}

/* BUTTON */
.submit-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 20px rgba(37,99,235,0.3);
}

/* BACK BUTTON */
.back-btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    background: #e5e7eb;
    border-radius: 8px;
    cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>

<div class="job-container">
    <div class="job-card">

        <h2>Create Job</h2>
        <p>Enter job description to analyze candidates using AI</p>

        <form method="POST">

            <div class="input-group">
                <label>Job Description</label>
                <textarea name="job_details" id="jobText" required oninput="updateCount()"></textarea>
            </div>

            <div class="char-count">
                <span id="count">0</span> characters
            </div>

            <button class="submit-btn">
                <i class="fa fa-plus"></i> Create Job
            </button>

        </form>

        <a href="/jobs">
            <button class="back-btn">⬅ Back</button>
        </a>

    </div>
</div>

<script>
function updateCount() {
    const text = document.getElementById("jobText").value;
    document.getElementById("count").innerText = text.length;
}
</script>

{% endblock %}
