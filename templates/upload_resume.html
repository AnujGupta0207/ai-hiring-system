{% extends "layout.html" %}
{% block content %}

<div class="card" data-aos="zoom-in">

    <h2>📤 Upload Resume</h2>
    <p style="color:#94a3b8; margin-bottom:20px;">
        Upload candidate resume or paste text for AI evaluation
    </p>

    <form method="POST" enctype="multipart/form-data">

        <!-- Candidate Name -->
        <label>👤 Candidate Name</label>
        <input type="text" name="candidate_name"
               placeholder="Enter Candidate Name"
               required>

        <!-- Resume Text -->
        <label>📄 Paste Resume (Optional)</label>
        <textarea name="resume_text"
                  rows="6"
                  placeholder="Paste resume here..."></textarea>

        <!-- DRAG & DROP UPLOAD 🔥 -->
        <label>📎 Upload Resume File</label>

        <div id="drop-area">
            <p>Drag & Drop Resume Here</p>
            <span>OR</span>
            <input type="file" name="resume_file" id="fileInput">
            <label for="fileInput" class="upload-btn">Browse File</label>
        </div>

        <!-- FILE NAME PREVIEW -->
        <p id="file-name" style="margin-top:10px; color:#22c55e;"></p>

        <br>

        <!-- SUBMIT -->
        <button type="submit">🚀 Evaluate Resume</button>

    </form>

</div>

<!-- ================= STYLES ================= -->
<style>
#drop-area {
    margin-top:10px;
    padding: 30px;
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
    background: rgba(255,255,255,0.03);
}

#drop-area:hover {
    background: rgba(255,255,255,0.08);
    border-color: #3b82f6;
}

#drop-area.dragover {
    background: rgba(59,130,246,0.2);
    border-color: #3b82f6;
}

.upload-btn {
    display: inline-block;
    margin-top:10px;
    padding: 8px 16px;
    background: #3b82f6;
    border-radius: 8px;
    cursor: pointer;
}

.upload-btn:hover {
    background: #2563eb;
}
</style>

<!-- ================= SCRIPT ================= -->
<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("file-name");

// Drag Events
dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("dragover");

    const file = e.dataTransfer.files[0];
    fileInput.files = e.dataTransfer.files;
    fileName.innerText = "✅ " + file.name;
});

// File select
fileInput.addEventListener("change", () => {
    if(fileInput.files.length > 0){
        fileName.innerText = "✅ " + fileInput.files[0].name;
    }
});
</script>

{% endblock %}
